apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamflix-v2
  labels:
    app: streamflix
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamflix
      version: v2
  template:
    metadata:
      labels:
        app: streamflix
        version: v2
    spec:
      containers:
      - name: streamflix
        image: kastrov/streamflix:v2
        ports:
        - containerPort: 5000
