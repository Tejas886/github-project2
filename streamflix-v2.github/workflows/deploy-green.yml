name: Deploy GREEN (v2)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build & Push Image
      run: |
        docker build -t kastrov/streamflix:v2 .
        docker push kastrov/streamflix:v2

    - name: Deploy GREEN to EKS (no traffic)
      run: |
        kubectl apply -f k8s/deployment.yaml

    - name: Verify GREEN pods
      run: |
        kubectl get pods -l app=streamflix,version=v2
